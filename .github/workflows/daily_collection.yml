name: Daily Trend Collection

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * *"

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e .
      - name: Run incremental collection
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_SEARCH_MODE: recent
          REDDIT_USER_AGENT: trend-detection-copilot/0.1
        run: python -m trend_copilot_data.pipeline --mode incremental --sources all
      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trend-data-${{ github.run_id }}
          path: |
            data/raw/
            data/snapshots/
            data/state/
            logs/
